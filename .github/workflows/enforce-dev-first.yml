name: Enforce dev-first workflow

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    name: Source branch must be dev
    runs-on: ubuntu-latest
    steps:
      - name: Require PR from dev
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "❌ PRs to main must come from the 'dev' branch."
            echo "   Source branch: ${{ github.head_ref }}"
            echo "   Merge your changes into dev first, then open a PR from dev → main."
            exit 1
          fi
          echo "✅ Source branch is dev — OK to merge."
